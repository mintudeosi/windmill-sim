 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wind Energy Simulator</title>
    <style>
        body {
            font-family: 'Comic Sans MS', 'Arial Rounded MT Bold', sans-serif;
            background-color: #87CEEB; /* Sky blue */
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            touch-action: none; /* Prevents iPad pull-to-refresh */
        }
        h1 {
            color: #333;
            margin-top: 20px;
            font-size: 2.5rem;
            text-align: center;
        }
        .container {
            display: flex;
            align-items: center;
            justify-content: center;
            flex: 1;
            width: 100%;
            gap: 50px;
        }
        /* Windmill CSS */
        .windmill-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .blades {
            width: 150px;
            height: 150px;
            position: relative;
            transform-origin: center;
            transition: transform 0.1s linear;
            z-index: 2;
        }
        .blade {
            position: absolute;
            width: 20px;
            height: 75px;
            background: #fff;
            border-radius: 10px 10px 0 0;
            top: 0;
            left: 65px;
            transform-origin: bottom center;
            border: 2px solid #ccc;
        }
        .blade:nth-child(2) { transform: rotate(120deg); }
        .blade:nth-child(3) { transform: rotate(240deg); }
        .motor {
            width: 40px;
            height: 40px;
            background: #555;
            border-radius: 50%;
            position: absolute;
            top: 55px;
            left: 55px;
            z-index: 3;
            border: 3px solid #333;
        }
        .tower {
            width: 20px;
            height: 200px;
            background: #888;
            margin-top: -75px;
            z-index: 1;
        }
        /* Wires and LED */
        .wires {
            width: 150px;
            height: 10px;
            background: repeating-linear-gradient(90deg, #ff4c4c, #ff4c4c 10px, #333 10px, #333 20px);
            margin-top: 50px;
            position: relative;
        }
        .energy-flow {
            position: absolute;
            top: 0; left: 0; height: 100%; width: 100%;
            background: rgba(255, 255, 0, 0.5);
            opacity: 0;
        }
        .led-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .led {
            width: 80px;
            height: 100px;
            background: #555;
            border-radius: 50px 50px 10px 10px;
            transition: all 0.2s;
        }
        .led-base {
            width: 60px;
            height: 20px;
            background: #333;
            border-radius: 0 0 10px 10px;
        }
        /* Controls */
        .controls {
            width: 80%;
            background: rgba(255,255,255,0.9);
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            margin-bottom: 40px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        input[type=range] {
            width: 100%;
            height: 40px;
            margin: 20px 0;
        }
        .status-text {
            font-size: 1.8rem;
            color: #0056b3;
            min-height: 80px;
        }
    </style>
</head>
<body>

    <h1>Wind Energy Simulator</h1>

    <div class="container">
        <div class="windmill-container">
            <div class="blades" id="blades">
                <div class="blade"></div>
                <div class="blade"></div>
                <div class="blade"></div>
                <div class="motor"></div>
            </div>
            <div class="tower"></div>
        </div>

        <div class="wires">
            <div class="energy-flow" id="flow"></div>
        </div>

        <div class="led-container">
            <div class="led" id="led"></div>
            <div class="led-base"></div>
        </div>
    </div>

    <div class="controls">
        <h2>Wind Speed</h2>
        <input type="range" id="windSlider" min="0" max="100" value="0">
        <div class="status-text" id="status">No wind. The blades are still, and no electricity is being generated.</div>
    </div>

    <script>
        const slider = document.getElementById('windSlider');
        const blades = document.getElementById('blades');
        const led = document.getElementById('led');
        const flow = document.getElementById('flow');
        const status = document.getElementById('status');

        let rotation = 0;

        function updateSimulator() {
            const speed = parseInt(slider.value);
            
            // Rotate blades
            rotation += speed * 0.2; 
            blades.style.transform = `rotate(${rotation}deg)`;

            // Update LED and Wires
            if (speed < 20) {
                led.style.backgroundColor = '#555';
                led.style.boxShadow = 'none';
                flow.style.opacity = 0;
                if (speed === 0) {
                    status.innerHTML = "<strong>0%:</strong> No wind. The blades are still, and no electricity is being generated.";
                } else {
                    status.innerHTML = `<strong>${speed}%:</strong> A light breeze. The blades are turning, but it's not fast enough for the generator to power the light.`;
                }
            } else {
                // Calculate brightness (20 to 100 maps to opacity/glow)
                const brightness = (speed - 20) / 80; 
                
                led.style.backgroundColor = `rgba(255, 255, 0, ${0.5 + (brightness * 0.5)})`;
                led.style.boxShadow = `0 0 ${20 + (brightness * 80)}px ${10 + (brightness * 30)}px rgba(255, 255, 0, ${brightness})`;
                
                flow.style.opacity = brightness;

                if (speed < 60) {
                    status.innerHTML = `<strong>${speed}%:</strong> The wind is picking up! Kinetic energy is turning into electrical energy. The LED is glowing!`;
                } else {
                    status.innerHTML = `<strong>${speed}%:</strong> Strong wind! The generator is spinning fast, creating maximum electrical energy for a super bright light!`;
                }
            }

            requestAnimationFrame(updateSimulator);
        }

        updateSimulator();
    </script>
</body>
</html>
